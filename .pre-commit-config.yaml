# Pre-commit hooks for kuaa-imgsearch.
#
# Install once with:  uv run pre-commit install
# Run on all files:   uv run pre-commit run --all-files
#
# Scope mirrors the CI `lint` job (ruff + black) plus basic file hygiene
# and bandit SAST.
# Mypy is intentionally NOT here — too slow on import-heavy modules.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        # -c reads [tool.bandit] from pyproject.toml (exclude_dirs + skips).
        # -ll reports only MEDIUM+ severity — keeps pre-commit fast and
        # matches the CI security job threshold.
        args: ["-c", "pyproject.toml", "-ll"]
