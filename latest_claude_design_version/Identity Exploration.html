<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Cinemateca Mojica — Identity Exploration v1</title>
<meta name="viewport" content="width=1480">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Schibsted+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
body { font-family: 'Geist', system-ui, sans-serif; }
#root { height: 100vh; }

/* Intent notes — small editorial cards that ride next to each artboard */
.note {
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 12.5px; color: #2a251f; line-height: 1.55;
  background: #fffdf8; border: 1px solid rgba(0,0,0,0.08);
  padding: 16px 18px; max-width: 320px;
}
.note h4 {
  margin: 0 0 8px; font-family: 'Newsreader', Georgia, serif;
  font-style: italic; font-weight: 400; font-size: 18px;
  letter-spacing: -0.01em; color: #1a1611;
}
.note .meta {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 0.16em; text-transform: uppercase; color: #888073;
  margin-bottom: 8px;
}
.note p { margin: 0 0 8px; text-wrap: pretty; }
.note ul { margin: 4px 0 0; padding-left: 16px; }
.note li { margin-bottom: 2px; }
.note .pill {
  display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; padding: 1px 5px; background: #e8e4d8; color: #5a4a2a;
  margin-right: 4px;
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="shells/data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shells/arquivo.jsx"></script>
<script type="text/babel" src="shells/cineteca.jsx"></script>
<script type="text/babel" src="shells/estacao.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useEffect } = React;

function NoteA() {
  return (
    <div className="note">
      <div className="meta">A · ARQUIVO · the museum vitrine</div>
      <h4>The editorial cinematheque.</h4>
      <p>Reads like the printed program of a film festival or the catalogue of a museum show. Slim left rail with films set as a typographic table-of-contents (year · title · scene count). No tab pills — navigation is a row of text links separated by hairlines, with a small vermilion dot for the active surface.</p>
      <p>Search is a quiet command line: mono input, italic-serif placeholder, all the hybrid-retrieval knobs sit in a row of typographic labels below. Results are unboxed — only typography and hairline rules separate cells, so the black-and-white keyframes carry the visual weight.</p>
      <ul>
        <li><b>Type:</b> Newsreader (display + film titles), Geist (UI), JetBrains Mono (technical).</li>
        <li><b>Accent:</b> Brazilian vermilion (#DC462A), used like a librarian's red pencil — sparingly.</li>
        <li><b>Risk:</b> closest to the existing direction. Restrained may read as <i>conservative</i> for a portfolio shot.</li>
      </ul>
    </div>
  );
}

function NoteB() {
  return (
    <div className="note">
      <div className="meta">B · CINETECA · the festival masthead</div>
      <h4>Festival identity, weaponised.</h4>
      <p>No sidebar. The shell is a masthead band over an editorial canvas, the way Berlinale or IFFR treat their program pages. The catalogue is a chip — click and a drawer slides in. The page title is an oversized italic display word ("<i>Buscar</i>.") that doubles as art direction.</p>
      <p>Results break the grid: a hero result spans two columns and dominates, with smaller cards stacked next to it. Multi-film attribution leads — every card shouts <i>which film, which year, which director</i>. Acid lime is the singular accent: tags, the submit button, the active dot. Heavy italic + bone + acid lime = unmistakably <i>this product</i> in a feed.</p>
      <ul>
        <li><b>Type:</b> Instrument Serif italic (display), Schibsted Grotesk (UI), JetBrains Mono (technical).</li>
        <li><b>Accent:</b> Chartreuse #D7E839, single source of color.</li>
        <li><b>Risk:</b> the hero crop costs density. Curators may push back on the grid asymmetry for eight-hour days.</li>
      </ul>
    </div>
  );
}

function NoteC() {
  return (
    <div className="note">
      <div className="meta">C · ESTAÇÃO · the instrument</div>
      <h4>Research instrument.</h4>
      <p>Closer to Bloomberg / a research lab notebook / a serious IDE than to a media app. Three resizable panes: film tree (left), dense result rows (center), inspector with hybrid-retrieval signals (right). Status bars top and bottom; hotkeys visible at all times.</p>
      <p>The "why this result" panel makes the retrieval pipeline <i>legible</i> — semantic / BM25 / rerank / fused scores rendered as bars, every figure tabular. The search input is a REPL prompt. Tabs are vim-modeline pills. Zero rounded corners, zero gradients — every pixel has a job.</p>
      <ul>
        <li><b>Type:</b> JetBrains Mono primary, Source Serif 4 (film titles only), IBM Plex Sans (descriptions).</li>
        <li><b>Accent:</b> phosphor cyan #7BB3D9, with green/amber/red for pipeline states.</li>
        <li><b>Risk:</b> screams "for engineers". May read cold to a curator hiring round; perfect for an applied-ML portfolio shot.</li>
      </ul>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="intro" title="Cinemateca Mojica — visual direction" subtitle="Three divergent shells for the v1.0 launch. Same content, same query, three different worlds. Drag to pan, scroll to zoom, click ⤢ on any artboard for fullscreen.">

        <DCArtboard id="note-a" label="A · intent" width={340} height={900}>
          <NoteA />
        </DCArtboard>
        <DCArtboard id="shell-a" label="A · Arquivo — editorial cinematheque" width={1440} height={900}>
          <ShellArquivo />
        </DCArtboard>

        <DCArtboard id="note-b" label="B · intent" width={340} height={900}>
          <NoteB />
        </DCArtboard>
        <DCArtboard id="shell-b" label="B · Cineteca — festival masthead" width={1440} height={900}>
          <ShellCineteca />
        </DCArtboard>

        <DCArtboard id="note-c" label="C · intent" width={340} height={900}>
          <NoteC />
        </DCArtboard>
        <DCArtboard id="shell-c" label="C · Estação — research instrument" width={1440} height={900}>
          <ShellEstacao />
        </DCArtboard>

      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
