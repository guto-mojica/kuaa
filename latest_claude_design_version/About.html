<head>

<title>Mojica · Sobre</title>
<meta name="viewport" content="width=1440">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html, body { margin: 0; padding: 0; height: 100%; background: #0E1014; color: #F1F3F7; }
body { font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
#root { height: 100vh; }
</style>

<script src="shells/data.js"></script>

<script type="text/babel" data-presets="react">
const ABOUT_CSS = `
.ab-app, .ab-app * { box-sizing: border-box; }
.ab-app *::-webkit-scrollbar { width: 8px; }
.ab-app *::-webkit-scrollbar-thumb { background: ${FX.border2}; border-radius: 4px; }
.ab-app *::-webkit-scrollbar-track { background: transparent; }

.ab-app {
  --bg: ${FX.bg};
  --panel: ${FX.panel};
  --raised: ${FX.raised};
  --hover: ${FX.hover};
  --bd: ${FX.border};
  --bd2: ${FX.border2};
  --bd3: ${FX.border3};
  --t: ${FX.text};
  --t2: ${FX.text2};
  --muted: ${FX.muted};
  --faint: ${FX.faint};
  --ac: ${FX.ac};
  --ac2: ${FX.ac2};
  --ac-dim: ${FX.acDim};
  --ac-bg: ${FX.acBg};
  --yellow: ${FX.yellow};
  --yellow-bg: ${FX.yellowBg};
  --pink: ${FX.pink};
  --green: ${FX.green};
  --green-bg: ${FX.greenBg};
  --orange: ${FX.orange};
  --sans: 'Geist', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  height: 100vh; width: 100vw;
  font-family: var(--sans); font-size: 13px; color: var(--t);
  position: relative;
  overflow: hidden;
}

/* ─── BACKDROP — atmospheric keyframe mosaic ───────────────────────── */
.ab-bg {
  position: absolute; inset: 0;
  background: var(--bg);
  overflow: hidden;
}
.ab-bg .layer {
  position: absolute; inset: -20px;
  display: grid; grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 1fr;
  gap: 6px;
  filter: blur(2px) brightness(0.35) contrast(1.05);
  opacity: 0.5;
}
.ab-bg .layer .tile {
  background-size: cover; background-position: center;
  width: 100%; height: 100%;
}
.ab-bg .vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(14,16,20,0.65) 60%, rgba(14,16,20,0.95) 100%);
}
.ab-bg .grain {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 12% 28%, rgba(139,123,216,0.06), transparent 40%),
    radial-gradient(circle at 88% 72%, rgba(245,200,66,0.04), transparent 40%);
}

/* ─── DIM MODAL OVERLAY ─────────────────────────────────────────────── */
.ab-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 30px;
  background: rgba(14,16,20,0.45);
  backdrop-filter: blur(6px);
}

.ab-modal {
  width: 660px; max-height: calc(100vh - 60px);
  background: var(--panel);
  border: 1px solid var(--bd2);
  border-radius: 10px;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.55),
    0 0 0 1px rgba(139,123,216,0.18),
    0 0 60px rgba(139,123,216,0.10);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* HEADER — soft purple wash + mark + close button */
.ab-head {
  position: relative;
  padding: 26px 28px 22px;
  border-bottom: 1px solid var(--bd);
  background:
    radial-gradient(circle at 88% 0%, rgba(139,123,216,0.16), transparent 60%),
    linear-gradient(180deg, rgba(139,123,216,0.06) 0%, transparent 100%);
}
.ab-head .close {
  position: absolute; top: 14px; right: 14px;
  width: 30px; height: 30px; border-radius: 6px;
  background: transparent; border: 1px solid var(--bd2);
  color: var(--t2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-family: var(--mono); font-size: 14px;
  transition: background .12s, border-color .12s, color .12s;
}
.ab-head .close:hover { background: var(--hover); color: var(--t); border-color: var(--bd3); }

.ab-mark-row {
  display: flex; align-items: center; gap: 14px; margin-bottom: 12px;
}
.ab-mark-row .mk {
  width: 44px; height: 44px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--bd2);
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 0 0 4px rgba(139,123,216,0.08),
    0 6px 16px rgba(0,0,0,0.4);
}
.ab-mark-row .runtag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px;
  padding: 3px 8px; border-radius: 12px;
  background: var(--ac-bg); color: var(--ac);
  letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600;
  margin-left: auto;
}
.ab-mark-row .runtag .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ac); }

.ab-head h1 {
  margin: 0; font-size: 26px; font-weight: 700;
  color: var(--t); letter-spacing: -0.018em; line-height: 1.15;
}
.ab-head .vrow {
  display: flex; align-items: center; gap: 12px; margin-top: 8px;
  font-family: var(--mono); font-size: 11px;
  color: var(--muted);
}
.ab-head .vrow .v { color: var(--t2); }
.ab-head .vrow .pill {
  padding: 1px 7px; border-radius: 3px;
  background: var(--raised); color: var(--t);
  font-weight: 500; letter-spacing: 0.02em;
}
.ab-head .vrow .pill.lic { color: var(--green); background: var(--green-bg); }
.ab-head .vrow .dot { color: var(--faint); }

.ab-head p {
  margin: 14px 0 0;
  font-size: 13.5px; line-height: 1.55; color: var(--t2);
  max-width: 60ch; text-wrap: pretty;
}
.ab-head p b { color: var(--t); font-weight: 500; }
.ab-head p .ac { color: var(--ac); }

/* BODY — scrollable */
.ab-body { overflow-y: auto; padding: 22px 28px 24px; flex: 1; }

/* STATS STRIP */
.ab-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
  background: var(--bd); border-radius: 7px; overflow: hidden;
  margin-bottom: 22px;
}
.ab-stat {
  background: var(--bg);
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 3px;
}
.ab-stat .n {
  font-family: var(--mono); font-size: 20px; font-weight: 700;
  color: var(--t); letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.ab-stat .k {
  font-size: 10.5px; color: var(--muted);
  letter-spacing: 0.04em;
}

/* SECTION HEAD */
.ab-sect {
  display: flex; align-items: baseline; justify-content: space-between;
  margin: 0 0 12px;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted);
}
.ab-sect .ct {
  font-family: var(--mono); color: var(--faint);
}
.ab-sect + * { margin-top: 0; }

/* MODEL ATTRIBUTIONS */
.ab-models {
  display: grid; gap: 8px; margin-bottom: 22px;
}
.ab-model {
  display: grid; grid-template-columns: 32px 1fr auto auto;
  align-items: center; gap: 12px;
  padding: 10px 12px;
  background: var(--bg); border: 1px solid var(--bd); border-radius: 6px;
  cursor: pointer; transition: border-color .12s, background .12s;
}
.ab-model:hover { background: var(--hover); border-color: var(--bd2); }
.ab-model .ico {
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  color: var(--ac);
  background: var(--ac-bg); border: 1px solid var(--ac-dim);
  letter-spacing: 0.02em;
}
.ab-model .ico.yellow { color: var(--yellow); background: var(--yellow-bg); border-color: rgba(245,200,66,0.3); }
.ab-model .ico.green { color: var(--green); background: var(--green-bg); border-color: rgba(92,203,145,0.3); }
.ab-model .ico.orange { color: var(--orange); background: rgba(245,144,66,0.14); border-color: rgba(245,144,66,0.3); }
.ab-model .ico.pink { color: var(--pink); background: rgba(232,121,199,0.16); border-color: rgba(232,121,199,0.3); }

.ab-model .info { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.ab-model .info .name {
  display: flex; align-items: baseline; gap: 8px;
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  color: var(--t);
}
.ab-model .info .name .ver {
  font-size: 10.5px; color: var(--muted); font-weight: 400;
}
.ab-model .info .role {
  font-size: 11.5px; color: var(--t2);
}
.ab-model .info .role b { color: var(--t); font-weight: 500; }

.ab-model .org {
  display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
  font-family: var(--mono); font-size: 10.5px;
  text-align: right;
}
.ab-model .org .by { color: var(--muted); }
.ab-model .org .repo {
  color: var(--ac); display: inline-flex; align-items: center; gap: 4px;
}

.ab-model .lic {
  font-family: var(--mono); font-size: 9.5px; padding: 2px 6px;
  border-radius: 3px; color: var(--t2);
  background: var(--raised); border: 1px solid var(--bd2);
  letter-spacing: 0.04em;
  min-width: 50px; text-align: center;
}

/* STACK PILLS */
.ab-stack { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
.ab-stack-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px; border-radius: 5px;
  background: var(--bg); border: 1px solid var(--bd);
  font-family: var(--mono); font-size: 11px; color: var(--t2);
}
.ab-stack-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.ab-stack-pill.ac { color: var(--ac); border-color: var(--ac-dim); background: var(--ac-bg); }
.ab-stack-pill.ac .dot { background: var(--ac); }
.ab-stack-pill.green .dot { background: var(--green); }
.ab-stack-pill.yellow .dot { background: var(--yellow); }
.ab-stack-pill.pink .dot { background: var(--pink); }
.ab-stack-pill.orange .dot { background: var(--orange); }

/* CREDITS BLOCK */
.ab-credits {
  background: var(--bg); border: 1px solid var(--bd); border-radius: 6px;
  padding: 14px 16px;
  display: grid; grid-template-columns: 110px 1fr; gap: 8px 18px;
  font-size: 12.5px;
}
.ab-credits .k { color: var(--muted); font-family: var(--mono); font-size: 11px; }
.ab-credits .v { color: var(--t); }
.ab-credits .v.dim { color: var(--t2); }
.ab-credits .v b { color: var(--ac); font-weight: 500; }

/* FOOTER */
.ab-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px; border-top: 1px solid var(--bd);
  background: var(--bg);
}
.ab-foot .l {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--mono); font-size: 10.5px;
  color: var(--muted); letter-spacing: 0.04em;
}
.ab-foot .l a { color: var(--t2); cursor: pointer; transition: color .12s; }
.ab-foot .l a:hover { color: var(--ac); }
.ab-foot .l .dot { color: var(--faint); }

.ab-foot .r { display: flex; align-items: center; gap: 8px; }
.ab-foot .ghost-btn {
  padding: 7px 13px; border-radius: 6px;
  background: transparent; color: var(--t2);
  border: 1px solid var(--bd2);
  font: inherit; font-size: 12.5px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
}
.ab-foot .ghost-btn:hover { border-color: var(--bd3); color: var(--t); }
.ab-foot .prim-btn {
  padding: 7px 13px; border-radius: 6px;
  background: var(--ac); color: #fff; border: none;
  font: inherit; font-size: 12.5px; cursor: pointer; font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
}
.ab-foot .prim-btn:hover { background: var(--ac2); }
.ab-foot .prim-btn .kbd {
  font-family: var(--mono); font-size: 10px;
  padding: 0 5px; border-radius: 3px;
  background: rgba(0,0,0,0.18);
}

/* Github icon spec */
.ab-ghico { width: 14px; height: 14px; }
`;

function GithubIcon() {

    <svg className="ab-ghico" viewBox="0 0 24 24" fill="currentColor">

    </svg>

}

  React.useEffect(() => {
    if (!document.getElementById('ab-css')) {
      const s = document.createElement('style'); s.id = 'ab-css';
      s.textContent = ABOUT_CSS; document.head.appendChild(s);

  // Atmospheric backdrop: a mosaic of 24 keyframes blurred + dimmed
  const keyframes = [

  return (

        <div className="ab-modal" onClick={(e) => e.stopPropagation()}>

          {/* HEADER */}

              <div className="mk"><FXMark size={26} /></div>
              <div></div>
              <span className="runtag">
                <span className="dot"></span>
                v1.0.0 estável
              </span>
            </div>
            <h1>Cinemateca Mojica</h1>
            <div className="vrow">
              <span className="pill">Acervo digital</span>
              <span className="dot">·</span>
              <span><span className="v">v1.0.0</span></span>
              <span className="dot">·</span>
              <span className="pill lic">MIT</span>
              <span className="dot">·</span>
              <span>build <span className="v">b342c8f</span></span>
              <span className="dot">·</span>
              <span>2026-04-12</span>
            </div>
            <p>
              Sistema interno de catalogação e busca semântica do acervo da Cinemateca Mojica.
              Indexa cenas, descrições, embeddings visuais e transcrições para apoiar curadoria,
              programação e pesquisa. <b className="ac">100% local</b> — nenhuma dependência de
              serviço externo, nenhum tráfego de saída em runtime.

          {/* BODY */}
          <div className="ab-body">

            {/* STATS */}
            <div className="ab-stats">
              <div className="ab-stat">
                <span className="n">06</span>
                <span className="k">filmes indexados</span>

                <span className="k">cenas detectadas</span>
              </div>
              <div className="ab-stat">
                <span className="n">8h 54m</span>

              </div>
              <div className="ab-stat">

                <span className="k">faixa temporal</span>
              </div>
            </div>

            {/* MODEL ATTRIBUTIONS */}

              <span className="ct">7 modelos · vendidos em ./models</span>
            </div>
            <div className="ab-models">
              <div className="ab-model">
                <div className="ico">C</div>
                <div className="info">
                  <div className="name">CLIP <span className="ver">ViT-L/14 · openai</span></div>

              <div className="ab-model">

                <div className="org">
                  <span className="by">Mixedbread</span>
                  <span className="repo">mixedbread-ai/mxbai-rerank <GithubIcon /></span>

              <div className="ab-model">

                <div className="org">
                  <span className="by">dorianbrown</span>
                  <span className="repo">dorianbrown/rank_bm25 <GithubIcon /></span>
                </div>
                <span className="lic">Apache-2</span>
              </div>
            </div>

            {/* STACK */}
            <div className="ab-sect">
              <span>Stack · offline-first</span>
              <span className="ct">~3.4k LOC python · ~1.8k LOC jinja+css</span>
