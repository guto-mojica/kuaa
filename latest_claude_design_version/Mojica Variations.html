<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Cinemateca Mojica — Branches</title>
<meta name="viewport" content="width=1480">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
body { font-family: 'Geist', system-ui, sans-serif; }
#root { height: 100vh; }

.note {
  font-family: 'Geist', system-ui, sans-serif;
  font-size: 12.5px; color: #2a251f; line-height: 1.55;
  background: #fffdf8; border: 1px solid rgba(0,0,0,0.08);
  padding: 16px 18px; max-width: 320px;
}
.note h4 {
  margin: 0 0 8px; font-family: 'Newsreader', Georgia, serif;
  font-style: italic; font-weight: 400; font-size: 18px;
  letter-spacing: -0.01em; color: #1a1611;
}
.note .meta {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  letter-spacing: 0.16em; text-transform: uppercase; color: #888073;
  margin-bottom: 8px;
}
.note p { margin: 0 0 8px; text-wrap: pretty; }
.note ul { margin: 4px 0 0; padding-left: 16px; }
.note li { margin-bottom: 3px; }
.note b { color: #1a1611; }
.note .swatch {
  display:inline-block; width: 12px; height: 12px; border-radius: 3px;
  vertical-align: -2px; margin-right: 5px;
  border: 1px solid rgba(0,0,0,0.1);
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="shells/data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mojica/app.jsx"></script>
<script type="text/babel" src="mojica/frame.jsx"></script>
<script type="text/babel" src="mojica/linear.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

function NoteEditorial() {
  return (
    <div className="note">
      <div className="meta">Baseline · editorial cinematheque</div>
      <h4>The editorial baseline.</h4>
      <p>Newsreader serif + Geist + JetBrains Mono. Vermilion as a librarian's red pencil — sparing. The three panes are interconnected through typography and hairlines, not chrome.</p>
      <ul>
        <li><b><span className="swatch" style={{background:'#DC462A'}}></span>Vermilion</b> accent · warm ink + paper text</li>
        <li>Serif film titles, mono technical metadata</li>
        <li>Editorial register — feels like a museum tool</li>
        <li>Lowest-density of the three</li>
      </ul>
    </div>
  );
}

function NoteFrame() {
  return (
    <div className="note">
      <div className="meta">Branch · Frame.io</div>
      <h4>Creative-pro media review.</h4>
      <p>Reskinned as a video-review tool. Cyan accent, rounded corners, "Share" button, top-right avatar. The right pane becomes a <i>comment thread</i> — moondream's description and the curator's annotation read as posts. New: a film-runtime timeline strip pinned to the bottom of the center pane shows where matches fall across the selected film's 96-minute runtime.</p>
      <ul>
        <li><b><span className="swatch" style={{background:'#4DAFFC'}}></span>Cyan accent</b> · <span className="swatch" style={{background:'#FF6B4A'}}></span>coral for pinned annotations</li>
        <li>Pure sans — no serif anywhere</li>
        <li>Bottom timeline shows match distribution across the film — kills the need to scrub</li>
        <li>"Project = Film" framing; works well for the multi-film v1.0 brief</li>
        <li>Highest visual density of the three; most SaaS-feeling</li>
      </ul>
    </div>
  );
}

function NoteLinear() {
  return (
    <div className="note">
      <div className="meta">Branch · Linear</div>
      <h4>Issue-tracker for an archive.</h4>
      <p>The retrieval pipeline as a serious instrument. Scenes are <i>issues</i>: each row has a status circle, a film-prefixed ID (<span style={{fontFamily:'JetBrains Mono', fontSize:11}}>JECA-111</span>), description, tags, priority tier (derived from score), film badge in its own colour, score. Right pane is the issue-detail with a properties grid mirroring Linear's pattern. Command palette (<span style={{fontFamily:'JetBrains Mono'}}>⌘K</span>) is the centerpiece. Films get individual colours so the catalogue self-organises visually.</p>
      <ul>
        <li><b><span className="swatch" style={{background:'#5E6AD2'}}></span>Indigo accent</b> · per-film colours: <span className="swatch" style={{background:'#EB5757'}}></span><span className="swatch" style={{background:'#F2994A'}}></span><span className="swatch" style={{background:'#F2C94C'}}></span><span className="swatch" style={{background:'#4CB782'}}></span><span className="swatch" style={{background:'#BB87FC'}}></span></li>
        <li>Highest data density · keyboard-first ergonomics</li>
        <li>Scene as <i>issue</i>: status / ID / description / tags / priority / film / score in one row</li>
        <li>Properties grid in right pane is the same shape as Linear's issue detail</li>
        <li>Reads as <i>retrieval engineering tool</i> — strong for the AI-portfolio audience, may feel administrative for a curator-only demo</li>
      </ul>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="baseline" title="Baseline · Editorial Cinematheque" subtitle="The hybrid we landed on. Vermilion + Newsreader + restrained chrome. Kept on the canvas as the comparison anchor.">
        <DCArtboard id="note-ed" label="Editorial · intent" width={340} height={900}>
          <NoteEditorial />
        </DCArtboard>
        <DCArtboard id="shell-ed" label="Editorial · the picked direction" width={1440} height={900}>
          <Mojica />
        </DCArtboard>
      </DCSection>

      <DCSection id="frame" title="Branch A · Frame.io" subtitle="What if Mojica were a creative-pro video review tool? Cyan accent, comment-thread inspector, runtime timeline strip.">
        <DCArtboard id="note-f" label="Frame.io · intent" width={340} height={900}>
          <NoteFrame />
        </DCArtboard>
        <DCArtboard id="shell-f" label="Frame.io branch" width={1440} height={900}>
          <MojicaFrame />
        </DCArtboard>
      </DCSection>

      <DCSection id="linear" title="Branch B · Linear" subtitle="What if Mojica were a serious instrument-grade tool? Indigo accent, scenes-as-issues, per-film colours, command palette as the centerpiece.">
        <DCArtboard id="note-l" label="Linear · intent" width={340} height={900}>
          <NoteLinear />
        </DCArtboard>
        <DCArtboard id="shell-l" label="Linear branch" width={1440} height={900}>
          <MojicaLinear />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
