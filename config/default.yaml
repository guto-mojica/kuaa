# ─────────────────────────────────────────────────────────────────────────────
# Cinemateca AI — Configuração padrão
# Copie este arquivo para 'config/local.yaml' e ajuste conforme necessário.
# Os valores aqui são os defaults conservadores (CPU, qualidade vs velocidade).
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: "Cinemateca AI"
  version: "0.1.0-alpha"

# ── Domain pack ───────────────────────────────────────────────────────────────
# Domain packs define prompts, metadata fields, filters, taxonomy, and export
# mapping. The archive pack preserves current behavior.
domain:
  pack: "archive"
  packs_dir: "config/domains"

# ── Caminhos ─────────────────────────────────────────────────────────────────
paths:
  library_dir: "data/library"   # root of the per-film layout (multi-film epic)
  data_dir: "data"
  raw_dir: "data/raw"
  frames_dir: "data/frames"
  metadata_dir: "data/metadata"
  embeddings_dir: "data/embeddings"
  models_dir: "models"
  outputs_dir: "outputs"
  logs_dir: "logs"

# ── Hardware ──────────────────────────────────────────────────────────────────
hardware:
  # "auto" detecta MPS → CUDA → CPU automaticamente
  # Forçar um device específico: "cpu", "cuda", "mps"
  device: "auto"
  force_cpu: false     # override de emergência — força CPU mesmo se GPU disponível

# ── Extração de frames (NB01) ─────────────────────────────────────────────────
frame_extraction:
  fps: 1                    # frames por segundo a extrair
  target_height: 480        # altura alvo (0 = manter original)
  quality: 2                # qualidade JPEG FFmpeg (2=alta, 31=baixa)
  sample_duration: null     # null = vídeo inteiro; int = segundos (ex: 300 = 5min)

# ── Detecção de cenas (NB02) ──────────────────────────────────────────────────
scene_detection:
  detector: "adaptive"      # "content" ou "adaptive" — adaptive é mais robusto para filmes P&B de arquivo
  # ContentDetector
  content_threshold: 27.0   # menor = mais sensível (mais cortes detectados)
  # AdaptiveDetector
  adaptive_threshold: 3.0
  # Compartilhado
  min_scene_len: 15         # duração mínima da cena em frames
  keyframes_per_scene: 3    # 1=frame do meio; 3=início/meio/fim
  keyframe_height: 480      # altura dos keyframes salvos (0 = resolução original)

# ── Análise visual (NB03) ─────────────────────────────────────────────────────
visual_analysis:
  # Detecção facial (MTCNN)
  face_detection:
    enabled: true
    min_face_size: 20
    thresholds: [0.6, 0.7, 0.7]
  # Detecção de objetos (YOLOv8)
  object_detection:
    enabled: true
    model: "yolov8n.pt"     # n=nano, s=small, m=medium, l=large, x=xlarge
    confidence: 0.30
  # Classificação de ambiente (heurística)
  environment:
    enabled: true
    brightness_threshold: 100   # limiar dia/noite (escala 0-255)
    edge_density_threshold: 0.05  # limiar interno/externo

# ── Embeddings e busca (NB04) ────────────────────────────────────────────────
embeddings:
  model: "ViT-B-32"         # modelo CLIP open_clip
  pretrained: "openai"
  batch_size: 16
  # Arquivo de saída (relativo a embeddings_dir)
  filename: "keyframe_embeddings.npy"
  mapping_filename: "index_mapping.json"
  # Cosine-similarity floor for text search. Empirically, ViT-B-32/openai's
  # score band on this archival corpus is too narrow to be separated by a
  # single absolute floor: "men"/"dog"/"a man" cluster at 0.22–0.25, and so
  # does off-distribution noise like "airplane"/"smartphone". Any floor
  # high enough to cut the noise also cuts real signal.
  #
  # Default 0.0 disables the floor — recall over precision, since a user
  # can dismiss weak hits visually but cannot dismiss results they do not
  # see. Keep the knob: a future multilingual model + reranker (Month-2)
  # may widen the gap and let a meaningful floor come back. Use the new
  # INFO logs on /api/search to inspect the actual score distribution
  # before tuning this back up.
  min_similarity: 0.0

# ── Search UI / retrieval knobs (Mojica redesign) ────────────────────────────
# Read-only display knobs surfaced in the Buscar tab's `.knob` row + the chips
# that toggle modality. Most are placeholders for Month-2 retrieval-depth work
# (hybrid + reranker + multimodal); the flags default OFF so the chrome ships
# disabled-by-default and lights up tab-by-tab as each backend lands.
search:
  # Default ``k`` (top-K) surfaced in the "k" knob.
  top_k_default: 9
  # Hybrid weights — semantic (CLIP) vs lexical (BM25). The Mojica knob shows
  # them as sem/bm25 floats; until M2 ships the actual hybrid pipeline these
  # are display-only.
  hybrid_sem_w: 0.70
  hybrid_bm25_w: 0.30
  hybrid_enabled: false       # M2: hybrid retrieval
  rerank_enabled: false       # M2: cross-encoder reranker
  mmr_lambda: 0.5             # Maximal Marginal Relevance λ
  # Modality gates (each toggles its chip on/off in the Buscar tab).
  image_enabled: true         # existing image-similarity search
  audio_enabled: false        # M2: CLAP audio-only search
  multimodal_enabled: false   # M3: cross-modal CLIP×CLAP fusion
  # M2: the right inspector's Signals panel (.b-sigs) is gated on this until
  # the per-modality score breakdown actually exists.
  signals_enabled: false

# ── Descrição LLM (NB05) ──────────────────────────────────────────────────────
llm:
  model_id: "vikhyatk/moondream2"
  revision: "2025-01-09"
  # Processamento
  checkpoint_interval: 25   # salvar progresso a cada N frames
  process_limit: null       # null = tudo; int = limitar (para testes)
  # GGUF GPU offload: -1 = todas as camadas na GPU (sem efeito num build
  # CPU-only do llama-cpp-python; aí roda em CPU). 0 = forçar CPU.
  gpu_layers: -1
  # Saída
  descriptions_filename: "scene_descriptions.json"
  tags_filename: "scene_tags.json"

# ── Model backends (pluggable — see docs/PROTOCOL_OPTION.md) ──────────────────
models:
  image_embedder: clip_openclip            # clip_openclip
  face_detector: mtcnn_pytorch             # mtcnn_pytorch
  object_detector: yolov8                  # yolov8
  # Default: keyless, offline Moondream 2 via HF transformers. GPU comes from
  # the installed PyTorch wheel (CUDA/MPS) — no source build, works on
  # Linux/Windows/macOS. Opt-in alternative: moondream_gguf (llama-cpp-python;
  # GPU needs a from-source CUDA build — see docs/GPU_LLAMA_CPP_CUDA_BUILD.md).
  scene_describer: moondream_transformers  # moondream_transformers | moondream_gguf
  environment_classifier: opencv_heuristic # opencv_heuristic

# ── Pipeline ──────────────────────────────────────────────────────────────────
pipeline:
  # Quais módulos rodar (desative para pular etapas já concluídas)
  steps:
    frame_extraction: true
    scene_detection: true
    visual_analysis: true
    embeddings: true
    llm_description: true
  # Comportamento
  skip_existing: true       # pular etapas se outputs já existirem
  stop_on_error: false      # false = continua mesmo com erros não-fatais

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  to_file: true
  filename: "cinemateca.log"
