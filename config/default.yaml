# ─────────────────────────────────────────────────────────────────────────────
# Cinemateca AI — Configuração padrão
# Copie este arquivo para 'config/local.yaml' e ajuste conforme necessário.
# Os valores aqui são os defaults conservadores (CPU, qualidade vs velocidade).
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: "Cinemateca AI"
  version: "0.1.0-alpha"

# ── Domain pack ───────────────────────────────────────────────────────────────
# Domain packs define prompts, metadata fields, filters, taxonomy, and export
# mapping. The archive pack preserves current behavior.
domain:
  pack: "archive"
  packs_dir: "config/domains"

# ── Caminhos ─────────────────────────────────────────────────────────────────
paths:
  library_dir: "data/library"   # root of the per-film layout (multi-film epic)
  data_dir: "data"
  raw_dir: "data/raw"
  frames_dir: "data/frames"
  metadata_dir: "data/metadata"
  embeddings_dir: "data/embeddings"
  models_dir: "models"
  outputs_dir: "outputs"
  logs_dir: "logs"

# ── Hardware ──────────────────────────────────────────────────────────────────
hardware:
  # "auto" detecta MPS → CUDA → CPU automaticamente
  # Forçar um device específico: "cpu", "cuda", "mps"
  device: "auto"
  force_cpu: false     # override de emergência — força CPU mesmo se GPU disponível

# ── Extração de frames (NB01) ─────────────────────────────────────────────────
frame_extraction:
  fps: 1                    # frames por segundo a extrair
  target_height: 480        # altura alvo (0 = manter original)
  quality: 2                # qualidade JPEG FFmpeg (2=alta, 31=baixa)
  sample_duration: null     # null = vídeo inteiro; int = segundos (ex: 300 = 5min)

# ── Detecção de cenas (NB02) ──────────────────────────────────────────────────
scene_detection:
  detector: "adaptive"      # "content" ou "adaptive" — adaptive é mais robusto para filmes P&B de arquivo
  # ContentDetector
  content_threshold: 27.0   # menor = mais sensível (mais cortes detectados)
  # AdaptiveDetector
  adaptive_threshold: 3.0
  # Compartilhado
  min_scene_len: 15         # duração mínima da cena em frames
  keyframes_per_scene: 3    # 1=frame do meio; 3=início/meio/fim
  keyframe_height: 480      # altura dos keyframes salvos (0 = resolução original)

# ── Análise visual (NB03) ─────────────────────────────────────────────────────
visual_analysis:
  # Detecção facial (MTCNN)
  face_detection:
    enabled: true
    min_face_size: 20
    thresholds: [0.6, 0.7, 0.7]
  # Detecção de objetos (YOLOv8)
  object_detection:
    enabled: true
    model: "yolov8n.pt"     # n=nano, s=small, m=medium, l=large, x=xlarge
    confidence: 0.30
  # Classificação de ambiente (heurística)
  environment:
    enabled: true
    brightness_threshold: 100   # limiar dia/noite (escala 0-255)
    edge_density_threshold: 0.05  # limiar interno/externo

# ── Embeddings e busca (NB04) ────────────────────────────────────────────────
embeddings:
  model: "ViT-B-32"         # modelo CLIP open_clip
  pretrained: "openai"
  batch_size: 16
  # Arquivo de saída (relativo a embeddings_dir)
  filename: "keyframe_embeddings.npy"
  mapping_filename: "index_mapping.json"
  # Cosine-similarity floor for text search. Empirically, ViT-B-32/openai's
  # score band on this archival corpus is too narrow to be separated by a
  # single absolute floor: "men"/"dog"/"a man" cluster at 0.22–0.25, and so
  # does off-distribution noise like "airplane"/"smartphone". Any floor
  # high enough to cut the noise also cuts real signal.
  #
  # Default 0.0 disables the floor — recall over precision, since a user
  # can dismiss weak hits visually but cannot dismiss results they do not
  # see. Keep the knob: a future multilingual model + reranker (Month-2)
  # may widen the gap and let a meaningful floor come back. Use the new
  # INFO logs on /api/search to inspect the actual score distribution
  # before tuning this back up.
  min_similarity: 0.0

# ── Audio embeddings (NB06 / Month-1 of v1.0 retrieval) ──────────────────────
audio_embeddings:
  # HF Hub id. laion/larger_clap_general is keyless, MIT-licensed, joint
  # text+audio space (~1.7 GB on first download).
  model_id: "laion/larger_clap_general"
  batch_size: 8
  # CLAP's native context is ~10 s @ 48 kHz. Scenes longer than this are
  # split into non-overlapping chunks and mean-pooled.
  chunk_seconds: 10.0
  sample_rate: 48000
  # Output filenames (relative to data/library/<slug>/audio/)
  filename: "clap_embeddings.npy"
  mapping_filename: "audio_mapping.json"

# ── Search UI / retrieval knobs (Mojica redesign) ────────────────────────────
# Read-only display knobs surfaced in the Buscar tab's `.knob` row + the chips
# that toggle modality. Most are placeholders for Month-2 retrieval-depth work
# (hybrid + reranker + multimodal); the flags default OFF so the chrome ships
# disabled-by-default and lights up tab-by-tab as each backend lands.
search:
  # Default ``k`` (top-K) surfaced in the "k" knob.
  top_k_default: 9
  # Hybrid weights — semantic (CLIP) vs lexical (BM25). The Mojica knob shows
  # them as sem/bm25 floats; until M2 ships the actual hybrid pipeline these
  # are display-only.
  hybrid_sem_w: 0.70
  hybrid_bm25_w: 0.30
  hybrid_enabled: true        # M2 default (Plan 4 of 8) — was: false
  bm25:
    k1: 1.5                    # BM25 saturation
    b: 0.75                    # length normalisation
    stopwords_lang: null       # null = no stopword removal
    rrf_k: 60                  # RRF rank-shift constant (Cormack et al.)
  rerank_enabled: false       # M2: cross-encoder reranker (enable in local.yaml after validating on real data)
  reranker:
    model: "cross-encoder/ms-marco-MiniLM-L-12-v2"  # English, ~70 MB, CPU-friendly; use mmarco-mMiniLMv2-L12-H384-v1 for multilingual
    top_k: 50    # candidates fed to the cross-encoder from first-stage retrieval
  mmr_lambda: 0.5             # Maximal Marginal Relevance λ
  # Modality gates (each toggles its chip on/off in the Buscar tab).
  image_enabled: true         # existing image-similarity search
  audio_enabled: false        # M2: CLAP audio-only search
  multimodal_enabled: false   # M3: cross-modal CLIP×CLAP fusion
  # M2: the right inspector's Signals panel (.b-sigs) is gated on this until
  # the per-modality score breakdown actually exists.
  signals_enabled: false

# ── Rimas Visuais (cross-film visual rhymes) ─────────────────────────────────
# Read-only knobs for the Rimas tab's kNN over CLIP keyframes. Defaults match
# the prototype expectation in docs/superpowers/plans/2026-05-20-mojica-frame-redesign.md
# (Task 21). M3 swaps the kNN backend for CLIP × CLAP fusion + MMR diversity +
# cross-encoder rerank; the public shape (top_n + mmr_lambda + threshold) is
# intended to stay stable through that swap.
rimas:
  top_n: 8                # how many neighbours the route returns
  mmr_lambda: 0.5         # Maximal Marginal Relevance λ (M3 — display-only today)
  threshold: 0.75         # cosine floor for the M3 reranker (display-only today)

# ── Collaboration (comment thread / composer / pin persistence) ──────────────
# The Mojica inspector renders a comment composer + activity thread; both lean
# on a collaboration backend that does not exist yet (no user model, no
# comment persistence, no pin store). Each surface is gated on its own flag so
# the right pane ships disabled-by-default and lights up incrementally as the
# backend lands. Activity tab still renders the moondream description as a
# read-only ``.b-com.ai`` row independent of these flags.
collaboration:
  composer_enabled: false   # post-launch: the textarea + tool buttons
  threads_enabled: false    # post-launch: curator/viewer comment rows
  # Demo curator + viewer comments rendered on the Anotar / Buscar
  # inspector when ``threads_enabled`` is off. They make the v1.0 launch
  # screenshots match the prototype before a real comment backend lands.
  # Flip this off (or replace with ``threads_enabled: true``) once the
  # collaboration epic ships and real curator notes flow through.
  demo_threads_enabled: true


# ── Descrição LLM (NB05) ──────────────────────────────────────────────────────
llm:
  model_id: "vikhyatk/moondream2"
  revision: "2025-01-09"
  # Processamento
  checkpoint_interval: 25   # salvar progresso a cada N frames
  process_limit: null       # null = tudo; int = limitar (para testes)
  # GGUF GPU offload: -1 = todas as camadas na GPU (sem efeito num build
  # CPU-only do llama-cpp-python; aí roda em CPU). 0 = forçar CPU.
  gpu_layers: -1
  # Saída
  descriptions_filename: "scene_descriptions.json"
  tags_filename: "scene_tags.json"

# ── Model backends (pluggable — see docs/PROTOCOL_OPTION.md) ──────────────────
models:
  image_embedder: clip_openclip            # clip_openclip | clip_mclip (multilingual, same 512-dim image space)
  face_detector: mtcnn_pytorch             # mtcnn_pytorch
  object_detector: yolov8                  # yolov8
  # Default: keyless, offline Moondream 2 via HF transformers. GPU comes from
  # the installed PyTorch wheel (CUDA/MPS) — no source build, works on
  # Linux/Windows/macOS. Opt-in alternative: moondream_gguf (llama-cpp-python;
  # GPU needs a from-source CUDA build — see docs/GPU_LLAMA_CPP_CUDA_BUILD.md).
  scene_describer: moondream_transformers  # moondream_transformers | moondream_gguf
  environment_classifier: opencv_heuristic # opencv_heuristic
  # Default keyless, offline CLAP via HF transformers. Lazy load on first
  # use; ~1.7 GB weights cached under HF_HOME on first encode.
  audio_embedder: clap_hf                  # clap_hf

# ── Pipeline ──────────────────────────────────────────────────────────────────
pipeline:
  # Quais módulos rodar (desative para pular etapas já concluídas)
  steps:
    frame_extraction: true
    scene_detection: true
    visual_analysis: true
    embeddings: true
    llm_description: true
    # New audio steps — opt-in via CLI ``--steps audio_extract,audio_embed``
    # until M2 audio-search work lands; then this defaults flip to true.
    audio_extract: false
    audio_embed: false
  # Comportamento
  skip_existing: true       # pular etapas se outputs já existirem
  stop_on_error: false      # false = continua mesmo com erros não-fatais

# ── Processamento tab (UI) ────────────────────────────────────────────────────
# Knobs the Processing tab template reads. Off-by-default flags here
# never affect the pipeline runner — they only gate optional UI panels.
proc:
  # When true, the .p-rp right pane renders a GPU/VRAM/CPU/RAM
  # resource card under the active-step substeps. No measurement source
  # is wired today; flipping this on without populating ``gpu_metrics``
  # in the route context is a no-op (the template gates on both).
  gpu_metrics_enabled: false

# ── Eval set builder (admin-only grading UI) ──────────────────────────────────
# Where grade JSONLs and curated query files live, and which run id the /eval
# page reads/writes by default. The /eval surface is itself admin-gated by the
# ``EVAL_ADMIN_TOKEN`` env var (unset = entire surface returns 403). The path
# is repo-relative; tests rebase it through ``api.services.eval_service``.
eval:
  root: data/eval
  run_id: default

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  to_file: true
  filename: "cinemateca.log"
