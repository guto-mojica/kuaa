# Cinemateca imgsearch — Continuous Integration
#
# Seven jobs: lint (strict), test-smoke (fast/model-free), test-heavy (full matrix),
# typecheck (mypy, blocking), security (bandit + pip-audit), build (sdist/wheel), benchmark (smoke).
#
# Install strategy: we use the `full` extra + `dev` group. Why not a lighter
# extra like `[search]`?  Several tests import `cinemateca.models.describer.*`
# (transformers + GGUF backends), `cinemateca.models.clap.*`, and the FastAPI
# stack directly — none of which live under `[search]`. The hermetic test
# fixtures mock model weights so no GB-scale weight download happens at test
# time, but the wheels still need to be present at import time.
#
# Disk/time budget: this pulls torch (~800MB compressed; ~1.1GB unpacked) plus
# transformers, llama-cpp-python, ultralytics, facenet, etc. Total venv ~5.8GB.
# A free ubuntu-latest runner has ~14GB free; uv's aggressive caching keeps
# repeat installs under a minute. Cold cache ~3-5 min. Acceptable for a
# portfolio repo at this scale; revisit if CI minutes become a concern.
#
# Python matrix: 3.10 (declared minimum) + 3.12 (forward compat). Skipping
# 3.11 (covered by .python-version locally) and 3.13 (transformers/torch lag).
# OS: ubuntu-latest only. Portfolio repo; macOS/Windows runners cost 10x+.
#
# Mypy is now a blocking gate (T2 / WS-5): zero errors on src+api enforced.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Lint and format only need the dev group, not the heavy ML extras.
      # `--only-group dev` keeps this job cheap (<30s cold).
      - name: Install dev tooling
        run: uv sync --only-group dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Black (format check)
        run: uv run black --check .

  test-smoke:
    name: Tests — smoke (model-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Smoke tests are model-free: only the web extra + dev group are needed
      # for FastAPI TestClient + the non-model code paths.
      - name: Install (web extra + dev group)
        run: uv sync --extra web --group dev

      - name: Pytest (smoke only)
        run: uv run pytest tests/ -q -m smoke --no-cov

  test-heavy:
    name: Tests — heavy (full extra, matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project (full extra + dev group)
        run: uv sync --extra full --group dev

      - name: Pytest (heavy + smoke, full extra)
        run: uv run pytest tests/ -q -m "not e2e" --cov=src/cinemateca --cov=api --cov-report=term-missing

  typecheck:
    name: Typecheck (mypy, blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (full extra + dev group)
        run: uv sync --extra full --group dev

      - name: Mypy
        run: uv run mypy src api

  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # bandit and pip-audit run via uvx (ephemeral — fetched on the fly,
      # no project dependency, no uv.lock change). This is the reconciliation
      # from the implementation plan: avoids adding bandit/pip-audit to the
      # dev group while the lockfile has an unrelated in-flight prune.
      - name: Bandit (SAST, MEDIUM+ severity)
        # -c reads [tool.bandit] from pyproject.toml for exclude_dirs + skips.
        # -ll = MEDIUM+ only; Low findings are documented false-positives in
        # [tool.bandit].skips with inline justification.
        run: uvx bandit -c pyproject.toml -r src api -ll

      - name: pip-audit (dependency CVEs)
        # Audit the active environment resolved by pip's own resolver against
        # the PyPI advisory database. No --ignore-vuln entries needed: the
        # current scan returns clean (verified 2026-05-30). Add pinned
        # --ignore-vuln GHSA-xxxx entries here (with a one-line comment) if a
        # transitive CVE surfaces that has no fix available.
        run: uvx pip-audit --progress-spinner off

  build:
    name: Build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        # uv build is built-in — no extra dependency. Produces dist/*.tar.gz
        # (sdist) + dist/*.whl (pure-Python wheel; no C extension so py3-none-any).
        run: uv build

      - name: Smoke-import the built wheel in a clean venv
        # Installs the wheel (+ its declared base deps) into a throwaway venv,
        # then imports the package and prints the version.  This proves the
        # wheel is self-contained and that `import cinemateca` succeeds without
        # the `full` or `dev` extras.  Pydantic>=2.0 is now a base dep (needed
        # at import time by cinemateca.config.loader) so it installs with the wheel.
        run: |
          python -m venv /tmp/whltest
          /tmp/whltest/bin/pip install --no-cache-dir dist/*.whl
          /tmp/whltest/bin/python -c "import cinemateca; print('wheel import OK', cinemateca.__version__)"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  benchmark:
    name: Benchmark (retrieval latency, smoke)
    # This job is intentionally non-blocking when no index is present.
    # CI runners have no Jeca Tatu artefacts; the job emits a ::notice:: and
    # exits 0 in that case.  It runs for real only on self-hosted runners (or
    # future CI that restores a cached demo bundle via scripts/prepare_demo.py).
    # When WS-4 E6 ships its smoke entry, swap the bench_retrieval.py step for
    # the E6 smoke command and drop the prepare_demo.py download step.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Full extra needed: bench loads torch + CLIP embedder at runtime.
      # On standard ubuntu-latest the index is absent so the bench will
      # exit 0 (no-op) after the guard check — the install cost is still
      # paid for correctness (imports must not error on the load path).
      - name: Install (full extra + dev group)
        run: uv sync --extra full --group dev

      # Best-effort: try to fetch the demo index bundle (Jeca Tatu artefacts).
      # scripts/prepare_demo.py is a future helper (WS-4 / E6 scope); if it
      # does not exist yet the step silently sets have_index=0 and the bench
      # skips cleanly.  This step never hard-fails; it records availability
      # in a step output so the bench step can be conditioned on it.
      - name: Prepare demo index (best-effort)
        id: demo
        run: |
          if [ -f scripts/prepare_demo.py ]; then
            if uv run python scripts/prepare_demo.py --download 2>/tmp/demo.log; then
              echo "have_index=1" >> "$GITHUB_OUTPUT"
            else
              echo "have_index=0" >> "$GITHUB_OUTPUT"
              echo "::notice::demo bundle unavailable; benchmark will run in no-op mode"
            fi
          else
            echo "have_index=0" >> "$GITHUB_OUTPUT"
            echo "::notice::prepare_demo.py not found (E6 not yet shipped); benchmark runs as a no-op pass"
          fi

      # Run the smoke bench.  When an index IS present (have_index=1) this
      # produces a real timing report.  When the index is absent (have_index=0
      # or the script's own guard fires), --smoke causes a graceful exit 0.
      # The step is NOT conditioned on have_index so it always exercises the
      # no-index guard path in CI — proving the guard works on every PR.
      - name: Retrieval benchmark (smoke scale, n=8 k=20)
        run: |
          uv run python scripts/bench_retrieval.py --smoke \
            --out /tmp/bench_smoke.json --markdown /tmp/bench_smoke.md
          echo "bench step exit code: $?"

      # Only upload the report artifact when a real bench ran (index present).
      - name: Archive benchmark report
        if: steps.demo.outputs.have_index == '1'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke
          path: |
            /tmp/bench_smoke.json
            /tmp/bench_smoke.md
