<div class="remove-film-confirm" style="padding: 8px 14px; display: flex; flex-direction: column; gap: 8px;">
    <span style="font-size: 12.5px; color: var(--c-text);">{{ _("Remove") }} <em>{{ film_title }}</em>?</span>
    <form class="remove-confirm__actions" style="display: flex; gap: 6px; flex-wrap: wrap;"
          hx-post="/api/library/remove/{{ slug }}"
          hx-target="#lp-scroll"
          hx-swap="innerHTML">
        <button type="submit" name="wipe" value=""
                class="fx-btn secondary" style="font-size: 11px; padding: 3px 8px;">{{ _("Library only") }}</button>
        <button type="submit" name="wipe" value="1"
                class="fx-btn secondary" style="font-size: 11px; padding: 3px 8px; color: var(--c-error);">{{ _("+ wipe data") }}</button>
        <button type="button"
                class="fx-btn ghost" style="font-size: 11px; padding: 3px 8px;"
                hx-get="/api/library/tree"
                hx-target="#lp-scroll"
                hx-swap="innerHTML">{{ _("Cancel") }}</button>
    </form>
</div>
