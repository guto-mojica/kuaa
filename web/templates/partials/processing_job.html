{% from "partials/_icons.html" import icon %}
<div class="processing-job" id="job-{{ job.id }}">

    <div class="processing-job__header">
        <span class="processing-job__title text-muted">
            {{ icon("film-strip") }}
            {{ job.video_name }}
        </span>
        {% if job.status in ('running', 'created') %}
        <button type="button"
                class="processing-job__cancel"
                hx-post="/api/pipeline/cancel/{{ job.id }}"
                hx-target="#job-{{ job.id }}"
                hx-swap="outerHTML">
            {{ icon("x-circle") }}
            {{ _("Cancel") }}
        </button>
        {% endif %}
    </div>

    <!-- SSE connection — the server emits typed events: "update" for
         progress frames and exactly one terminal "done", "error" or
         "cancelled" frame. sse-swap listens to all of them so the final
         stepper (terminal state) is rendered into the DOM, and sse-close
         closes the EventSource on the terminal events so it does NOT
         reconnect after the job finishes. The swap-then-close ordering is
         guaranteed because the extension registers the sse-swap listeners
         before the sse-close listener on the same EventSource, and DOM
         listeners fire in registration order, so the terminal frame's
         final stepper is rendered into the DOM before source.close(). -->
    <div hx-ext="sse"
         sse-connect="/api/pipeline/stream/{{ job.id }}"
         sse-close="done,error,cancelled">
        <div sse-swap="update,done,error,cancelled" hx-swap="innerHTML">
            {% include "partials/processing_stepper.html" with context %}
        </div>
    </div>

</div>
