<div class="processing-job" id="job-{{ job.id }}">
    <p class="processing-job__title text-muted">
        <ph-icon name="film-strip" weight="light"></ph-icon>
        {{ job.video_name }}
    </p>

    <!-- SSE connection — the server emits typed events: "update" for
         progress frames and exactly one terminal "done" or "error"
         frame. sse-swap listens to all three so the final stepper
         (done/error state) is rendered into the DOM, and sse-close
         closes the EventSource on the terminal events so it does NOT
         reconnect after the job finishes. -->
    <div hx-ext="sse"
         sse-connect="/api/pipeline/stream/{{ job.id }}"
         sse-close="done,error">
        <div sse-swap="update,done,error" hx-swap="innerHTML">
            {% include "partials/processing_stepper.html" with context %}
        </div>
    </div>
</div>
