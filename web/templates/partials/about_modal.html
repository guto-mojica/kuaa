{% from "partials/_icons.html" import icon %}
<div class="modal-backdrop" onclick="document.getElementById('modal-container').innerHTML=''">
    <div class="modal-card" onclick="event.stopPropagation()">
        <button class="modal-close"
                onclick="document.getElementById('modal-container').innerHTML=''"
                title="{{ _('Close') }}">
            {{ icon("x") }}
        </button>

        <header class="modal-header">
            {{ icon("film-reel", "modal-logo") }}
            <h1 class="modal-title">Cinemateca AI</h1>
        </header>

        {% include "partials/_about_credits.html" %}
    </div>
</div>
