{% from "partials/_icons.html" import icon %}
<div class="tab-panel">

    <div class="search-mode-toggle">
        <button class="active" type="button" onclick="setSearchMode('text')">{{ _("Text") }}</button>
        <button type="button" onclick="setSearchMode('image')">{{ _("Image") }}</button>
    </div>

    <!-- ── Text search ────────────────────────────────────────────────────── -->
    <div id="search-text-panel">
        <!--
            Two-level HTMX pattern:
            • The INPUT owns hx-get for as-you-type (keyup delay, no from: needed).
              hx-include="closest form" pulls in tag checkboxes from the form.
            • The FORM owns hx-get for submit (Enter key or button click) and for
              tag-checkbox changes. A visible submit button ensures the browser
              always fires the submit event on Enter, regardless of form field count.
        -->
        <form id="search-text-form"
              hx-get="/api/search"
              hx-trigger="submit, change from:.search-tag-filter input"
              hx-target="#search-results">

            <div class="search-container">
                <input id="search-input"
                       class="search-input"
                       type="text"
                       name="q"
                       autocomplete="off"
                       placeholder="{{ _('two people talking outdoors') }}"
                       hx-get="/api/search"
                       hx-trigger="keyup changed delay:500ms"
                       hx-target="#search-results"
                       hx-include="closest form">
                <button type="submit"
                        class="search-submit-btn"
                        aria-label="{{ _('Search') }}">→</button>
            </div>

            {% if available_tags %}
            <div class="search-tag-filter tag-filter">
                {% for tag in available_tags %}
                <label class="tag-pill">
                    <input type="checkbox" name="tags" value="{{ tag }}">{{ tag }}
                </label>
                {% endfor %}
            </div>
            {% endif %}
        </form>
    </div>

    <!-- ── Image search ───────────────────────────────────────────────────── -->
    <div id="search-image-panel" style="display:none">
        <form hx-post="/api/search/image"
              hx-encoding="multipart/form-data"
              hx-trigger="change from:#image-input"
              hx-target="#search-results">
            <label class="image-upload-label" for="image-input">
                {{ icon("upload-simple") }}
                <span id="image-upload-filename">{{ _("Choose image…") }}</span>
                <input id="image-input" type="file" name="file" accept="image/*"
                       onchange="document.getElementById('image-upload-filename').textContent = this.files[0]?.name || '{{ _('Choose image…') }}'">
            </label>
        </form>
    </div>

    <div id="search-results" class="scene-grid"></div>
</div>

<script>
function setSearchMode(mode) {
    document.getElementById('search-text-panel').style.display  = mode === 'text'  ? '' : 'none';
    document.getElementById('search-image-panel').style.display = mode === 'image' ? '' : 'none';
    document.querySelectorAll('.search-mode-toggle button').forEach(function(b, i) {
        b.classList.toggle('active', (mode === 'text' && i === 0) || (mode === 'image' && i === 1));
    });
    document.getElementById('search-results').innerHTML = '';
}
</script>
