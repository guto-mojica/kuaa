{% from "partials/_icons.html" import icon %}
{% if error %}
<p class="add-film-form__error">{{ error }}</p>
{% endif %}
<div class="tree-node tree-node--add"
     hx-get="/api/library/pick-file"
     hx-target="#library-tree"
     hx-swap="innerHTML">
    {{ icon("upload-simple") }} {{ _("Browse…") }}
    <span class="htmx-indicator add-film-form__spinner">{{ icon("spinner-gap", "spin") }}</span>
</div>
<p class="add-film-form__sep">{{ _("or enter path") }}</p>
<form class="add-film-form"
      hx-post="/api/library/add"
      hx-target="#library-tree"
      hx-swap="innerHTML">
    <input class="filter-input"
           type="text"
           name="video_path"
           placeholder="{{ _('Video file path or filename') }}"
           required
           autofocus>
    <input class="filter-input"
           type="text"
           name="title"
           placeholder="{{ _('Title (optional)') }}">
    <div class="add-film-form__actions">
        <button type="submit" class="tree-node tree-node--add">{{ _("Add") }}</button>
        <div class="tree-node"
             hx-get="/api/library/filter"
             hx-target="#library-tree"
             hx-swap="innerHTML">{{ _("Cancel") }}</div>
    </div>
</form>
