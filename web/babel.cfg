# Patterns are resolved relative to the directory pybabel is pointed at.
# The documented invocation (CLAUDE.md / SETUP.md) is:
#   pybabel extract -F web/babel.cfg -o web/locales/messages.pot web/
# so the root is `web/` and the glob must be `templates/**.html`
# (NOT `web/templates/**.html`, which would resolve to web/web/...).
# All user-facing strings live in the Jinja templates; the Python layer
# (api/, src/) carries no `_()` UI strings, so no [python:] section is
# needed for the user catalog.
#
# NOTE: jinja2.ext.autoescape was REMOVED from modern Jinja2 (autoescape
# is built in). Listing it makes the jinja2 babel extractor raise
# AttributeError and silently yield zero strings — that defect is why
# the catalog had drifted. Only jinja2.ext.i18n is needed for
# {{ _("...") }} extraction.
[jinja2: templates/**.html]
extensions = jinja2.ext.i18n
